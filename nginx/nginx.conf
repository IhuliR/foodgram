server {
    listen 80;
    server_name foodgramir.duckdns.org;
    client_max_body_size 10M;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name foodgramir.duckdns.org;
    client_max_body_size 10M;
    index index.html;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/foodgramir.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/foodgramir.duckdns.org/privkey.pem;

    location /api/ {
        proxy_set_header Host $host;
        proxy_pass http://backend:8000/api/;
    }

    location /api/docs/ {
        root /usr/share/nginx/html;
        try_files $uri $uri/redoc.html;
    }

    location /admin/ {
        proxy_set_header Host $host;
        proxy_pass http://backend:8000/admin/;
    }

    location /media/ {
        alias /media/;
    }

    location /s/ {
        proxy_set_header Host $host;
        proxy_pass http://backend:8000;
    }

    location / {
        alias /static/;
        try_files $uri /index.html;
    }
}